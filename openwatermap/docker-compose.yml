version: "3.9"

services:

  # ============================================================
  # БЭКЕНД — Go сервер
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: openwatermap-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DB_PATH: "/data/water.db"
      FRONTEND_URL: "http://localhost:5173"
    volumes:
      # SQLite файл хранится снаружи контейнера — данные не теряются при перезапуске
      - water_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================
  # ФРОНТЕНД — Nginx отдаёт HTML файл
  # ============================================================
  frontend:
    image: nginx:alpine
    container_name: openwatermap-web
    restart: unless-stopped
    ports:
      - "5173:80"
    volumes:
      - ./openwatermap.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy

# ============================================================
# VOLUMES — постоянное хранилище для SQLite
# ============================================================
volumes:
  water_data:
    name: openwatermap_data
